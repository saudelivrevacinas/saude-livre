<script>

function aumentar(){
    let qtd = document.getElementById("quantidade");
    qtd.value = Number(qtd.value) + 1;
}

function diminuir(){
    let qtd = document.getElementById("quantidade");

    if(Number(qtd.value) > 1){
        qtd.value = Number(qtd.value) - 1;
    }
}

    let total = 0;

    carrinho.forEach((item, index) => {

        total += item.preco * item.quantidade;

        itens.innerHTML += `
        <div class="item-carrinho">

           <button class="btn-menos" onclick="diminuirItem(${index})">
            <i class="fa-solid fa-minus"></i>
            </button>

            <span>${item.nome} x ${item.quantidade}</span>

            <button class="btn-mais" onclick="aumentarItem(${index})">
            <i class="fa-solid fa-plus"></i>
            </button>

            <button class="btn-lixeira" onclick="removerItem(${index})">
            <i class="fa-solid fa-trash"></i>
</button>

        </div>
        `;
    });

    totalBox.innerHTML =
    `Total: R$ ${total.toLocaleString("pt-BR")}`;
}

function salvarCarrinho(carrinho){
    localStorage.setItem("carrinho", JSON.stringify(carrinho));
    atualizarCarrinho();
}

function aumentarItem(index){
    let carrinho =
    JSON.parse(localStorage.getItem("carrinho")) || [];

    carrinho[index].quantidade++;

    salvarCarrinho(carrinho);
}

function diminuirItem(index){
    let carrinho =
    JSON.parse(localStorage.getItem("carrinho")) || [];

    if(carrinho[index].quantidade > 1){
        carrinho[index].quantidade--;
    } else {
        carrinho.splice(index, 1);
    }

    salvarCarrinho(carrinho);
}

function removerItem(index){
    let carrinho =
    JSON.parse(localStorage.getItem("carrinho")) || [];

    carrinho.splice(index, 1);

    salvarCarrinho(carrinho);
}

function zerarCarrinho(){
    localStorage.removeItem("carrinho");
    atualizarCarrinho();
}

const botaoComprar = document.querySelector(".buy");

botaoComprar.addEventListener("click", function(event){

    event.preventDefault();

    const nomeVacina =
    document.getElementById("titulo").innerText;

    const precoTexto =
    document.getElementById("preco").innerText;

    const quantidade =
    Number(document.getElementById("quantidade").value);

    const precoNumero = Number(
        precoTexto
        .replace("R$", "")
        .replace(/\./g, "")
        .replace(",", ".")
        .trim()
    );

    let carrinho =
    JSON.parse(localStorage.getItem("carrinho")) || [];

    const itemExistente =
    carrinho.find(item => item.nome === nomeVacina);

    if(itemExistente){
        itemExistente.quantidade += quantidade;
    } else {

        carrinho.push({
            nome: nomeVacina,
            preco: precoNumero,
            quantidade: quantidade
        });
    }

    localStorage.setItem(
        "carrinho",
        JSON.stringify(carrinho)
    );

    atualizarCarrinho();

    document
    .querySelector(".carrinho")
    .classList.add("ativo");

});

atualizarCarrinho();
function fecharCarrinho(){
    document.querySelector(".carrinho").classList.remove("ativo");
}
</script>

<div class="carrinho">

<button class="fechar-carrinho" onclick="fecharCarrinho()">

</button>

    </h2>

</button>
