<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Saúde Livre</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef7fc;
padding:40px 20px;
color:#08233a;
}

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:1fr 400px;
gap:35px;
}

.box{
background:white;
padding:35px;
border-radius:28px;
box-shadow:0 15px 45px rgba(0,0,0,0.08);
}

h1{
font-size:42px;
margin-bottom:30px;
}

h2{
margin-bottom:20px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input-group input{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid #dbe7f0;
font-size:16px;
outline:none;
}

.resumo-item{
padding:15px;
border-radius:14px;
background:#f4f8fb;
margin-bottom:15px;
}

.total{
font-size:28px;
font-weight:800;
margin-top:20px;
}

.finalizar{
width:100%;
margin-top:25px;
padding:18px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-size:18px;
font-weight:800;
cursor:pointer;
transition:0.3s;
}

.finalizar:hover{
transform:translateY(-4px);
}
.checkbox-lgpd{
margin-top:25px;
display:flex;
align-items:flex-start;
gap:12px;
}

.checkbox-lgpd input{
margin-top:4px;
transform:scale(1.2);
cursor:pointer;
}

.checkbox-lgpd label{
font-size:14px;
line-height:1.7;
color:#52677a;
}
@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}
.opcoes-atendimento{
display:flex;                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
flex-direction:column;
gap:14px;
margin-top:10px;
}

.opcao{
display:flex;
align-items:center;
justify-content:flex-start;
gap:14px;

padding:20px 22px;
border-radius:18px;
background:#f4f8fb;
cursor:pointer;
transition:0.3s;
font-weight:600;
border:2px solid transparent;
}
.opcao:hover{
background:#e8f4ff;
border-color:#0ea5e9;
}

.opcao input{
transform:scale(1.25);
cursor:pointer;
}
.opcoes-atendimento .opcao{
display:flex !important;
align-items:center !important;
justify-content:flex-start !important;
gap:14px !important;
}

.opcoes-atendimento .opcao input{
width:auto !important;
margin:0 !important;
}
.aviso-domiciliar{

margin-top:12px;

font-size:14px;

color:#b45309;

background:#fff7ed;

padding:14px 16px;

border-radius:14px;

border:1px solid #fdba74;

line-height:1.6;
}
.voltar-checkout{

position:fixed;

top:30px;
left:30px;

width:52px;
height:52px;

display:flex;
align-items:center;
justify-content:center;

border-radius:16px;

background:white;

color:#08233a;

font-size:22px;

text-decoration:none;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

transition:0.25s;

z-index:999;
}

.voltar-checkout:hover{
transform:translateX(-4px);
background:#08233a;
color:white;
}
</style>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<body>
<a href="vacina.html" class="voltar-checkout">
    <i class="fa-solid fa-arrow-left"></i>
</a>
<div class="container">

<div class="box">

<h1>Checkout</h1>

<div class="input-group">
<label>Nome completo</label>

<input 
type="text"
id="nome"
placeholder="Digite seu nome"
oninput="validarNome(this)"
>
</div>

<div class="input-group">
<label>Telefone</label>

<input
type="text"
id="telefone"
maxlength="15"
placeholder="(61) 99999-9999"
oninput="formatarTelefone(this)"
>
</div>

<div class="input-group">
<label>CPF</label>

<input
type="text"
id="cpf"
maxlength="14"
placeholder="000.000.000-00"
oninput="formatarCPF(this)"
>
</div>
<div class="input-group">
<label>Endereço</label>
<input type="text" placeholder="Rua, número e bairro">
</div>
<div class="input-group">

<label>Tipo de atendimento</label>

<div class="opcoes-atendimento">
<label class="opcao">
<input type="radio" name="atendimento" value="clinica" onclick="atualizarTotal()">
<span>Atendimento na clínica</span>
</label>

<label class="opcao">
<input type="radio" name="atendimento" value="domiciliar" onclick="atualizarTotal()">
<span>Atendimento domiciliar</span>
</label>
</div>

</div>
<div class="checkbox-lgpd">
<input type="checkbox" id="lgpd">

<label for="lgpd">
Declaro que as informações fornecidas são verdadeiras e autorizo o uso dos meus dados para agendamento, atendimento e processamento da compra, conforme a Política de Privacidade e a LGPD.
</label>

</div>
</div>

<div class="box">

<h2>Resumo do pedido</h2>

<div id="resumoPedido"></div>

<div class="total" id="total">
  Total: R$ 0
</div>

<button class="finalizar">
Finalizar checkout
</button>

</div>
<p class="aviso-domiciliar">
⚠ O atendimento domiciliar possui uma taxa adicional de R$ 20.
</p>
</div>
<script>

function validarNome(input){

input.value = input.value.replace(/[^a-zA-ZÀ-ÿ\s]/g,'');

}

function formatarTelefone(input){

let valor = input.value.replace(/\D/g,'');

valor = valor.replace(/^(\d{2})(\d)/g,'($1) $2');

valor = valor.replace(/(\d{5})(\d)/,'$1-$2');

input.value = valor;

}

function formatarCPF(input){

let valor = input.value.replace(/\D/g,'');

valor = valor.replace(/(\d{3})(\d)/,'$1.$2');

valor = valor.replace(/(\d{3})(\d)/,'$1.$2');

valor = valor.replace(/(\d{3})(\d{1,2})$/,'$1-$2');

input.value = valor;

}

</script>
<script>

function atualizarTotal(){
 const carrinho = JSON.parse(localStorage.getItem("carrinhoCheckout")) || [];

  const domiciliar = document.querySelector('input[value="domiciliar"]');
  const total = document.getElementById("total");

  let valor = 0;

  carrinho.forEach(item => {
    valor += item.preco * item.quantidade;
  });

  if(domiciliar && domiciliar.checked){
    valor += 20;
  }

  total.innerHTML = `Total: R$ ${valor.toLocaleString("pt-BR")}`;
}
function carregarResumo(){
const carrinho = JSON.parse(localStorage.getItem("carrinhoCheckout")) || [];
  const resumo = document.getElementById("resumoPedido");
  const total = document.getElementById("total");

  let valor = 0;
  resumo.innerHTML = "";

  carrinho.forEach(item => {
    valor += item.preco * item.quantidade;

    resumo.innerHTML += `
      <div class="resumo-item">
        ${item.nome} — Quantidade: ${item.quantidade}
      </div>
    `;
  });

  total.innerHTML = `Total: R$ ${valor.toLocaleString("pt-BR")}`;
}

carregarResumo();
</script>
</body>
</html>
